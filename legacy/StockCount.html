<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stock Count">
<meta name="theme-color" content="#0f1117">
<title>Stock Count</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
<!-- Supabase client (multi-user live sync + photo storage) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#12151e;--border:#2a2d40;--accent:#f5c542;--text:#f3f4f6;--text2:#9ca3af;--text3:#6b7280;--blue:#60a5fa;--green:#34d399;--red:#f87171;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);font-family:'DM Sans','Segoe UI',sans-serif;color:var(--text);overflow:hidden;}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  input,select,textarea{outline:none;font-family:inherit;} button{cursor:pointer;border:none;font-family:inherit;}
  #app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}
  .header{background:linear-gradient(135deg,var(--bg2),var(--bg3));padding:14px 18px 0;border-bottom:1px solid var(--border);flex-shrink:0;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .header-label{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;cursor:pointer;}
  .header-label .whoami{color:var(--accent);letter-spacing:0;text-transform:none;font-weight:700;}
  .header-title{font-size:22px;font-weight:900;color:var(--accent);}
  .presence{font-size:11px;margin:2px 0 8px;min-height:14px;}
  .header-btns{display:flex;gap:8px;}
  .btn-scan{background:#1e2a1e;color:var(--green);border:1px solid #1a3a1a;border-radius:12px;padding:10px 14px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:5px;}
  .btn-add{background:var(--accent);color:var(--bg);border-radius:12px;padding:10px 14px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:5px;box-shadow:0 4px 16px rgba(245,197,66,0.3);}
  .btn-add:active,.btn-scan:active{transform:scale(0.96);}
  .tabs{display:flex;}
  .tab{background:none;color:var(--text3);padding:10px 20px;font-size:14px;font-weight:400;border-bottom:2px solid transparent;transition:all 0.2s;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
  .content{flex:1;overflow-y:auto;padding:14px 16px 80px;}
  .search-wrap{position:relative;margin-bottom:12px;}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;}
  .search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 36px;color:var(--text);font-size:14px;}
  .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;color:var(--text3);font-size:18px;padding:4px;}
  .cat-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;scrollbar-width:none;}
  .cat-scroll::-webkit-scrollbar{display:none;}
  .chip{background:var(--bg2);color:var(--text2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:13px;white-space:nowrap;flex-shrink:0;transition:all 0.18s;}
  .chip.active{background:var(--accent);color:var(--bg);font-weight:600;border-color:var(--accent);}
  .summary-row{display:flex;gap:10px;margin-bottom:14px;}
  .summary-card{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;}
  .summary-val{font-size:17px;font-weight:700;color:var(--accent);}
  .summary-unit{font-size:10px;color:var(--text3);}
  .summary-label{font-size:11px;color:var(--text3);margin-top:2px;}
  .item-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px;display:flex;gap:11px;margin-bottom:10px;animation:ci .22s ease;}
  @keyframes ci{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .item-photo{width:62px;height:62px;border-radius:10px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:26px;}
  .item-photo img{width:100%;height:100%;object-fit:cover;}
  .item-info{flex:1;min-width:0;}
  .item-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .item-name{font-size:15px;font-weight:600;margin-bottom:4px;}
  .item-qty{font-size:20px;font-weight:700;color:var(--accent);flex-shrink:0;}
  .item-qty-unit{font-size:11px;color:var(--text3);}
  .item-price{font-size:11px;color:var(--text3);}
  .tags{display:flex;gap:5px;flex-wrap:wrap;}
  .tag{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid;}
  .tag-cat{background:#1e2535;color:var(--blue);border-color:#1e3a5f;}
  .tag-date{background:#1e2535;color:var(--green);border-color:#14532d;}
  .tag-bc{background:#1a1a2e;color:#a78bfa;border-color:#2d2060;}
  .tag-user{background:#2a1f12;color:var(--accent);border-color:#5a4310;}
  .item-note{font-size:12px;color:var(--text3);margin-top:3px;font-style:italic;}
  .item-actions{display:flex;gap:7px;margin-top:9px;}
  .btn-step{background:#2a2d40;color:var(--text);border-radius:8px;width:34px;padding:7px 0;font-size:16px;font-weight:700;flex-shrink:0;}
  .btn-step:active{transform:scale(0.92);}
  .btn-edit{flex:1;background:#2a2d40;color:var(--blue);border-radius:8px;padding:7px 0;font-size:12px;}
  .btn-del{background:#2a1a1a;color:var(--red);border:1px solid #7f1d1d;border-radius:8px;padding:7px 12px;font-size:12px;}
  .empty{text-align:center;padding:60px 20px;color:var(--text3);}
  .empty-icon{font-size:52px;margin-bottom:12px;}
  .empty-text{font-size:15px;}
  /* Stats */
  .export-row{display:flex;gap:10px;margin-bottom:16px;}
  .btn-export{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:12px 0;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-export:active{transform:scale(0.97);}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px;animation:ci .3s ease;}
  .stat-icon{font-size:26px;margin-bottom:8px;}
  .stat-val{font-size:21px;font-weight:700;margin-bottom:3px;}
  .stat-lbl{font-size:12px;color:var(--text3);}
  .section-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
  .section-title{font-size:14px;font-weight:600;margin-bottom:14px;}
  .bar-row{margin-bottom:12px;}
  .bar-label{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;color:#d1d5db;}
  .bar-track{background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(.22,1,.36,1);}
  .rank-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .rank-num{width:24px;height:24px;border-radius:6px;background:#2a2d40;color:var(--text3);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .rank-num.top{background:var(--accent);color:var(--bg);}
  .rank-photo{width:32px;height:32px;border-radius:6px;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;}
  .rank-photo img{width:100%;height:100%;object-fit:cover;}
  .rank-info{flex:1;min-width:0;}
  .rank-name{font-size:13px;color:#e5e7eb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rank-bar-track{background:var(--bg3);border-radius:3px;height:5px;margin-top:4px;overflow:hidden;}
  .rank-bar-fill{height:100%;border-radius:3px;transition:width 0.6s;}
  .rank-qty{font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0;}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.25s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal-sheet{width:100%;max-width:480px;margin:0 auto;background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 18px 40px;max-height:92dvh;overflow-y:auto;border:1px solid var(--border);transform:translateY(30px);transition:transform 0.3s cubic-bezier(.22,1,.36,1);}
  .modal-overlay.open .modal-sheet{transform:translateY(0);}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .modal-title{font-size:17px;font-weight:700;}
  .modal-close{background:#2a2d40;color:var(--text2);border-radius:8px;width:32px;height:32px;font-size:20px;display:flex;align-items:center;justify-content:center;}
  .field-group{margin-bottom:14px;}
  .field-label{font-size:13px;color:var(--text2);display:block;margin-bottom:7px;}
  .field-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:15px;}
  .field-input::placeholder{color:var(--text3);}
  .field-row{display:flex;gap:10px;margin-bottom:14px;}
  select.field-input{appearance:none;}
  textarea.field-input{resize:none;}
  .photo-area{width:100%;height:120px;border-radius:12px;border:2px dashed #3a3f5c;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--bg3);overflow:hidden;}
  .photo-placeholder{text-align:center;color:var(--text3);pointer-events:none;}
  .photo-placeholder-icon{font-size:28px;margin-bottom:5px;}
  .photo-preview{width:100%;height:100%;object-fit:cover;display:block;}
  .btn-remove-photo{margin-top:7px;background:#2a1a1a;color:var(--red);border:1px solid #7f1d1d;border-radius:8px;padding:5px 12px;font-size:12px;}
  .qty-stepper{display:flex;align-items:center;gap:10px;}
  .qty-stepper button{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:46px;height:46px;border-radius:10px;font-size:22px;font-weight:700;flex-shrink:0;}
  .qty-stepper button:active{transform:scale(0.92);}
  .qty-stepper input{text-align:center;}
  .barcode-row{display:flex;gap:8px;}
  .btn-submit{width:100%;background:var(--accent);color:var(--bg);border-radius:12px;padding:14px 0;font-size:16px;font-weight:700;box-shadow:0 4px 20px rgba(245,197,66,0.25);}
  .btn-submit:active{transform:scale(0.97);}
  /* Confirm */
  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:2000;opacity:0;pointer-events:none;transition:opacity 0.2s;padding:20px;}
  .confirm-overlay.open{opacity:1;pointer-events:all;}
  .confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px 20px;width:300px;max-width:100%;text-align:center;transform:scale(0.9);transition:transform 0.2s;}
  .confirm-overlay.open .confirm-box{transform:scale(1);}
  .confirm-btns{display:flex;gap:10px;}
  .btn-cancel{flex:1;background:#2a2d40;color:var(--text2);border-radius:10px;padding:11px 0;font-size:14px;}
  .btn-confirm-del{flex:1;background:#7f1d1d;color:var(--red);border:1px solid #ef4444;border-radius:10px;padding:11px 0;font-size:14px;font-weight:600;}
  /* Toast */
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-10px);padding:10px 22px;border-radius:24px;font-size:14px;z-index:9999;white-space:nowrap;opacity:0;transition:all 0.25s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.success{background:#14532d;color:#fff;border:1px solid #22c55e;}
  .toast.error{background:#7f1d1d;color:#fff;border:1px solid #ef4444;}
  .toast.info{background:#1e3a5f;color:#fff;border:1px solid var(--blue);}
  /* Scanner */
  .scanner-overlay{position:fixed;inset:0;background:#000;z-index:4000;display:flex;flex-direction:column;}
  .scanner-header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;background:rgba(0,0,0,0.6);flex-shrink:0;}
  .scanner-video{width:100%;height:100%;object-fit:cover;}
  .scanner-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .scanner-box{width:240px;height:240px;position:relative;}
  .corner{position:absolute;width:36px;height:36px;}
  .corner-tl{top:0;left:0;border-top:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:6px 0 0 0;}
  .corner-tr{top:0;right:0;border-top:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 6px 0 0;}
  .corner-bl{bottom:0;left:0;border-bottom:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:0 0 0 6px;}
  .corner-br{bottom:0;right:0;border-bottom:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 0 6px 0;}
  .scan-line{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanline 2s ease-in-out infinite;}
  @keyframes scanline{0%{top:4px}50%{top:232px}100%{top:4px}}
  .scanner-hint{position:absolute;bottom:40px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.8);font-size:13px;}
  .manual-input{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10;}
  .unsupported-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center;gap:16px;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-label" onclick="changeName()">Counting as · <span class="whoami" id="whoami">—</span> ✎</div>
        <div class="header-title">Stock Count</div>
      </div>
      <div class="header-btns">
        <button class="btn-scan" onclick="openScanner()"><span style="font-size:18px">📷</span> Scan</button>
        <button class="btn-add" onclick="openAdd()"><span style="font-size:18px">+</span> Add</button>
      </div>
    </div>
    <div class="presence" id="presence"></div>
    <div class="tabs">
      <button class="tab active" id="tab-list" onclick="switchTab('list')">Product List</button>
      <button class="tab" id="tab-stats" onclick="switchTab('stats')">Analytics &amp; Export</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- Scanner -->
<div class="scanner-overlay" id="scanner" style="display:none;">
  <div class="scanner-header">
    <span style="font-size:16px;font-weight:700;color:#fff">Scan Barcode / QR Code</span>
    <button onclick="closeScanner()" style="background:#2a2d40;color:#9ca3af;border-radius:8px;padding:7px 14px;font-size:14px;">Close</button>
  </div>
  <div style="flex:1;position:relative;overflow:hidden;" id="scanner-body">
    <video id="scanner-video" class="scanner-video" playsinline muted></video>
    <div class="scanner-frame">
      <div class="scanner-box">
        <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div><div class="corner corner-br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="scanner-hint">Point the barcode or QR code at the frame</div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Product</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="field-group">
      <label class="field-label">Product Photo</label>
      <div class="photo-area" id="photo-area" onclick="document.getElementById('photo-input').click()">
        <div class="photo-placeholder" id="photo-placeholder"><div class="photo-placeholder-icon">📷</div><div style="font-size:13px">Tap to take photo or choose image</div></div>
        <img id="photo-preview" class="photo-preview" style="display:none" alt="">
      </div>
      <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
      <button class="btn-remove-photo" id="btn-remove-photo" style="display:none" onclick="removePhoto()">Remove Photo</button>
    </div>
    <div class="field-group">
      <label class="field-label">Barcode <span style="color:#6b7280;font-weight:400">(auto-filled by scan)</span></label>
      <div class="barcode-row">
        <input class="field-input" id="f-barcode" placeholder="Barcode (optional)" style="flex:1">
        <button onclick="openScannerFromModal()" style="background:#1e2a1e;color:#34d399;border:1px solid #1a3a1a;border-radius:10px;padding:0 14px;font-size:20px;flex-shrink:0;">📷</button>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">Product Name *</label>
      <input class="field-input" id="f-name" placeholder="Enter product name">
    </div>
    <div class="field-row">
      <div class="field-group" style="flex:2;margin-bottom:0">
        <label class="field-label">Quantity *</label>
        <div class="qty-stepper">
          <button type="button" onclick="stepQty(-1)">−</button>
          <input class="field-input" id="f-qty" type="number" inputmode="numeric" placeholder="0">
          <button type="button" onclick="stepQty(1)">+</button>
        </div>
      </div>
      <div class="field-group" style="flex:1;margin-bottom:0">
        <label class="field-label">Unit</label>
        <select class="field-input" id="f-unit">
          <option>pcs</option><option>box</option><option>pack</option><option>bottle</option><option>set</option><option>bag</option><option>roll</option><option>sheet</option><option>kg</option>
        </select>
      </div>
    </div>
    <div class="field-row" style="margin-top:14px">
      <div class="field-group" style="flex:1;margin-bottom:0">
        <label class="field-label">Category</label>
        <select class="field-input" id="f-cat">
          <option>Food</option><option>Drinks</option><option>Household</option><option>Electronics</option><option>Clothing</option><option>Other</option>
        </select>
      </div>
      <div class="field-group" style="flex:1;margin-bottom:0">
        <label class="field-label">Unit Price ($)</label>
        <input class="field-input" id="f-price" type="number" inputmode="decimal" placeholder="0.00">
      </div>
    </div>
    <div class="field-group" style="margin-top:14px">
      <label class="field-label">Notes</label>
      <textarea class="field-input" id="f-note" rows="2" placeholder="Optional notes…"></textarea>
    </div>
    <button class="btn-submit" id="btn-submit" onclick="handleSubmit()">Add Product</button>
  </div>
</div>

<!-- Confirm Delete -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div style="font-size:36px;margin-bottom:10px">🗑</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:6px">Delete Product</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:18px">This cannot be undone.</div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm-del" id="btn-confirm-del">Delete</button>
    </div>
  </div>
</div>

<!-- Who's counting -->
<div class="confirm-overlay" id="name-overlay">
  <div class="confirm-box">
    <div style="font-size:36px;margin-bottom:10px">👋</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:6px">Who's counting?</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:14px">Your name is added to each count so the team can see who did what.</div>
    <input class="field-input" id="name-input" placeholder="Your name" style="margin-bottom:14px" onkeydown="if(event.key==='Enter')saveName()">
    <button class="btn-submit" onclick="saveName()">Start counting</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
//  CONFIG — paste your Supabase project values here.
//  Get them in Supabase → Project Settings → API.
//  Until you do, the app runs in a local "offline demo" mode.
// ============================================================
const SUPABASE_URL = "<<PASTE_SUPABASE_URL>>";          // e.g. https://abcdwxyz.supabase.co
const SUPABASE_ANON_KEY = "<<PASTE_SUPABASE_ANON_KEY>>"; // the long "anon public" key
// ============================================================

const CLOUD = !SUPABASE_URL.includes("PASTE") && !SUPABASE_ANON_KEY.includes("PASTE");
let sb = null, presenceChannel = null, onlineUsers = [];
if (CLOUD) { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }

const CATS = ["All","Food","Drinks","Household","Electronics","Clothing","Other"];
const COLORS = ["#60a5fa","#34d399","#f5c542","#c084fc","#fb7185","#fb923c"];

let items = [];
let myName = localStorage.getItem("sc_user") || "";
let currentTab = "list", filterCat = "All", searchVal = "";
let editId = null, currentPhoto = null, currentPhotoFile = null, pendingDeleteId = null;
let scannerStream = null, scannerRaf = null, scannerFromModal = false;
let pendingOps = JSON.parse(localStorage.getItem("sc_pending") || "[]");
let reloadTimer = null;

function uid(){
  return (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
    : "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
}
function nowISO(){ return new Date().toISOString(); }
function todayStr(){ return new Date().toLocaleDateString("en-US"); }

function showToast(msg, type="success"){
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast " + type;
  setTimeout(()=>t.classList.add("show"),10);
  setTimeout(()=>t.classList.remove("show"),2400);
}

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ---------- Data layer (cloud OR local fallback) ----------
function mapRow(r){
  return {
    id:r.id, name:r.name, qty:Number(r.qty)||0, unit:r.unit||"pcs",
    category:r.category||"Other", price:Number(r.price)||0, barcode:r.barcode||"",
    note:r.note||"", photo:r.photo||null, updated_by:r.updated_by||"",
    date:r.created_at ? new Date(r.created_at).toLocaleDateString("en-US") : (r.date||todayStr())
  };
}
async function loadItems(){
  if(CLOUD){
    const {data,error} = await sb.from("products").select("*").order("created_at",{ascending:false});
    if(error){ console.error(error); showToast("Couldn't load — showing last saved copy","error"); items = JSON.parse(localStorage.getItem("sc_cache")||"[]"); }
    else { items = data.map(mapRow); localStorage.setItem("sc_cache", JSON.stringify(items)); }
  } else {
    items = JSON.parse(localStorage.getItem("sc_items")||"[]");
  }
}
function saveLocal(){ localStorage.setItem("sc_items", JSON.stringify(items)); }

function rowFromItem(it){
  return { id:it.id, name:it.name, qty:it.qty, unit:it.unit, category:it.category,
           price:it.price, barcode:it.barcode, note:it.note, photo:it.photo,
           updated_by:myName, updated_at:nowISO() };
}
async function persistUpsert(it){
  if(!CLOUD){ saveLocal(); return; }
  try{
    const {error} = await sb.from("products").upsert(rowFromItem(it));
    if(error) throw error;
    localStorage.setItem("sc_cache", JSON.stringify(items));
  }catch(e){
    queueOp({type:"upsert", row:rowFromItem(it)});
    showToast("Saved offline — will sync when online","info");
  }
}
async function persistDelete(id){
  if(!CLOUD){ saveLocal(); return; }
  try{
    const {error} = await sb.from("products").delete().eq("id", id);
    if(error) throw error;
    localStorage.setItem("sc_cache", JSON.stringify(items));
  }catch(e){
    queueOp({type:"delete", id});
    showToast("Deleted offline — will sync when online","info");
  }
}
function queueOp(op){ pendingOps.push(op); localStorage.setItem("sc_pending", JSON.stringify(pendingOps)); }
async function flushQueue(){
  if(!CLOUD || !pendingOps.length || !navigator.onLine) return;
  const ops = pendingOps.slice(); pendingOps = []; localStorage.setItem("sc_pending","[]");
  for(const op of ops){
    try{
      if(op.type==="upsert") { const {error}=await sb.from("products").upsert(op.row); if(error) throw error; }
      else if(op.type==="delete"){ const {error}=await sb.from("products").delete().eq("id",op.id); if(error) throw error; }
    }catch(e){ queueOp(op); }
  }
  if(!pendingOps.length) showToast("All changes synced ✓","success");
}
window.addEventListener("online", flushQueue);

async function uploadPhoto(file){
  const ext = (file.name.split(".").pop()||"jpg").toLowerCase().replace(/[^a-z0-9]/g,"") || "jpg";
  const path = uid() + "." + ext;
  const {error} = await sb.storage.from("photos").upload(path, file, {upsert:true, contentType:file.type||"image/jpeg"});
  if(error) throw error;
  return sb.storage.from("photos").getPublicUrl(path).data.publicUrl;
}

// ---------- Realtime + presence ----------
function subscribeRealtime(){
  if(!CLOUD) return;
  sb.channel("products-changes")
    .on("postgres_changes", {event:"*", schema:"public", table:"products"}, scheduleReload)
    .subscribe();
}
function scheduleReload(){
  clearTimeout(reloadTimer);
  reloadTimer = setTimeout(async ()=>{ await loadItems(); render(); }, 250);
}
function setupPresence(){
  if(!CLOUD){ renderPresence(); return; }
  if(presenceChannel){ try{ sb.removeChannel(presenceChannel); }catch(_){} }
  presenceChannel = sb.channel("counters", {config:{presence:{key: myName||"guest"}}});
  presenceChannel.on("presence", {event:"sync"}, ()=>{
    const state = presenceChannel.presenceState();
    onlineUsers = Object.values(state).flat().map(p=>p.name).filter(Boolean);
    renderPresence();
  });
  presenceChannel.subscribe(async (status)=>{
    if(status==="SUBSCRIBED") await presenceChannel.track({name: myName});
  });
}
function renderPresence(){
  const el = document.getElementById("presence");
  if(!el) return;
  if(!CLOUD){
    el.style.color = "var(--text3)";
    el.textContent = "⚪ Offline demo mode — add Supabase keys to enable live multi-user counting";
    return;
  }
  const others = onlineUsers.filter(n=>n!==myName);
  el.style.color = "var(--green)";
  if(others.length===1) el.textContent = "🟢 " + others[0] + " is also counting now";
  else if(others.length>1) el.textContent = "🟢 " + others.slice(0,2).join(", ") + (others.length>2?` +${others.length-2}`:"") + " are also counting now";
  else el.textContent = "🟢 Live · you're the only one counting right now";
}

// ---------- Name ----------
function saveName(){
  const v = document.getElementById("name-input").value.trim();
  if(!v) return showToast("Please enter your name","error");
  myName = v; localStorage.setItem("sc_user", v);
  document.getElementById("whoami").textContent = myName;
  document.getElementById("name-overlay").classList.remove("open");
  setupPresence();
}
function changeName(){
  document.getElementById("name-input").value = myName;
  document.getElementById("name-overlay").classList.add("open");
}

// ---------- Tabs / filters ----------
function switchTab(tab){
  currentTab = tab;
  document.getElementById("tab-list").classList.toggle("active", tab==="list");
  document.getElementById("tab-stats").classList.toggle("active", tab==="stats");
  render();
}
function getFiltered(){
  return items.filter(it=>(filterCat==="All"||it.category===filterCat)&&(
    it.name.toLowerCase().includes(searchVal.toLowerCase())||(it.barcode&&it.barcode.includes(searchVal))
  ));
}
function onSearch(v){ searchVal=v; render(); }
function clearSearch(){ searchVal=""; render(); }
function setCat(c){ filterCat=c; render(); }

function render(){ currentTab==="list" ? renderList() : renderStats(); }

function renderList(){
  const totalItems=items.length, totalQty=items.reduce((s,i)=>s+i.qty,0), totalVal=items.reduce((s,i)=>s+i.qty*i.price,0);
  const filtered=getFiltered();
  let html=`
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" placeholder="Search by name or barcode…" value="${esc(searchVal)}" oninput="onSearch(this.value)">
      ${searchVal?`<button class="search-clear" onclick="clearSearch()">×</button>`:""}
    </div>
    <div class="cat-scroll">${CATS.map(c=>`<button class="chip ${filterCat===c?"active":""}" onclick="setCat('${c}')">${c}</button>`).join("")}</div>
    <div class="summary-row">
      <div class="summary-card"><div class="summary-val">${totalItems}<span class="summary-unit"> SKU</span></div><div class="summary-label">Products</div></div>
      <div class="summary-card"><div class="summary-val">${totalQty}<span class="summary-unit"> units</span></div><div class="summary-label">Total Stock</div></div>
      <div class="summary-card"><div class="summary-val">$${totalVal.toFixed(0)}</div><div class="summary-label">Total Value</div></div>
    </div>`;
  if(!filtered.length){
    html+=`<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">${items.length===0?"No products yet — tap Add or Scan":"No products match your search"}</div></div>`;
  } else {
    filtered.forEach(item=>{
      const photo=item.photo?`<img src="${esc(item.photo)}" alt="">`:"📦";
      html+=`<div class="item-card">
        <div class="item-photo">${photo}</div>
        <div class="item-info">
          <div class="item-top">
            <div class="item-name">${esc(item.name)}</div>
            <div style="text-align:right;flex-shrink:0">
              <div class="item-qty">${item.qty}<span class="item-qty-unit"> ${esc(item.unit)}</span></div>
              ${item.price>0?`<div class="item-price">$${item.price}/${esc(item.unit)}</div>`:""}
            </div>
          </div>
          <div class="tags">
            <span class="tag tag-cat">${esc(item.category)}</span>
            <span class="tag tag-date">${esc(item.date)}</span>
            ${item.barcode?`<span class="tag tag-bc">🔖 ${esc(item.barcode)}</span>`:""}
            ${item.updated_by?`<span class="tag tag-user">👤 ${esc(item.updated_by)}</span>`:""}
          </div>
          ${item.note?`<div class="item-note">${esc(item.note)}</div>`:""}
          <div class="item-actions">
            <button class="btn-step" onclick="quickStep('${item.id}',-1)">−</button>
            <button class="btn-step" onclick="quickStep('${item.id}',1)">+</button>
            <button class="btn-edit" onclick="openEdit('${item.id}')">✏️ Edit</button>
            <button class="btn-del" onclick="confirmDelete('${item.id}')">🗑</button>
          </div>
        </div>
      </div>`;
    });
  }
  document.getElementById("content").innerHTML = html;
}

function renderStats(){
  const totalItems=items.length, totalQty=items.reduce((s,i)=>s+i.qty,0), totalVal=items.reduce((s,i)=>s+i.qty*i.price,0);
  const catSummary=CATS.slice(1).map(cat=>({cat,qty:items.filter(i=>i.category===cat).reduce((s,i)=>s+i.qty,0),count:items.filter(i=>i.category===cat).length})).filter(c=>c.count>0);
  const maxQty=Math.max(...items.map(i=>i.qty),1);
  const sorted=[...items].sort((a,b)=>b.qty-a.qty).slice(0,8);
  let html=`<div class="export-row">
    <button class="btn-export" onclick="exportCSV()">⬇️ Export CSV</button>
    <button class="btn-export" onclick="exportPDF()">🖨️ Print / PDF</button>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-val" style="color:#60a5fa">${totalItems}</div><div class="stat-lbl">Product Types</div></div>
    <div class="stat-card"><div class="stat-icon">🔢</div><div class="stat-val" style="color:#34d399">${totalQty}</div><div class="stat-lbl">Total Units</div></div>
    <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-val" style="color:#f5c542">$${totalVal.toFixed(0)}</div><div class="stat-lbl">Inventory Value</div></div>
    <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-val" style="color:#c084fc">${catSummary.length}</div><div class="stat-lbl">Categories</div></div>
  </div>`;
  if(catSummary.length){
    html+=`<div class="section-card"><div class="section-title">By Category</div>`;
    catSummary.forEach((c,i)=>{
      const pct=totalQty>0?Math.round((c.qty/totalQty)*100):0;
      html+=`<div class="bar-row"><div class="bar-label"><span>${c.cat}</span><span>${c.qty} units · ${pct}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${COLORS[i%COLORS.length]}"></div></div></div>`;
    });
    html+=`</div>`;
  }
  if(sorted.length){
    html+=`<div class="section-card"><div class="section-title">Top Stock by Quantity</div>`;
    sorted.forEach((item,i)=>{
      const pct=Math.round((item.qty/maxQty)*100);
      const photo=item.photo?`<img src="${esc(item.photo)}" alt="">`:"📦";
      html+=`<div class="rank-row">
        <div class="rank-num ${i<3?"top":""}">${i+1}</div>
        <div class="rank-photo">${photo}</div>
        <div class="rank-info"><div class="rank-name">${esc(item.name)}</div><div class="rank-bar-track"><div class="rank-bar-fill" style="width:${pct}%;background:hsl(${200+i*22},65%,55%)"></div></div></div>
        <div class="rank-qty">${item.qty} ${esc(item.unit)}</div>
      </div>`;
    });
    html+=`</div>`;
  }
  if(!items.length) html+=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">No data yet — add some products first</div></div>`;
  document.getElementById("content").innerHTML = html;
}

// ---------- Quick +/- on the list (fast counting) ----------
async function quickStep(id, delta){
  const item = items.find(i=>i.id===id);
  if(!item) return;
  item.qty = Math.max(0, (Number(item.qty)||0) + delta);
  item.updated_by = myName; item.date = item.date || todayStr();
  render();
  await persistUpsert(item);
}

// ---------- Modal ----------
function openAdd(){
  editId=null; currentPhoto=null; currentPhotoFile=null;
  document.getElementById("modal-title").textContent="Add Product";
  document.getElementById("btn-submit").textContent="Add Product";
  clearForm(); openModal();
}
function openEdit(id){
  const item=items.find(i=>i.id===id); if(!item)return;
  editId=id; currentPhoto=item.photo||null; currentPhotoFile=null;
  document.getElementById("modal-title").textContent="Edit Product";
  document.getElementById("btn-submit").textContent="Save Changes";
  document.getElementById("f-barcode").value=item.barcode||"";
  document.getElementById("f-name").value=item.name;
  document.getElementById("f-qty").value=item.qty;
  document.getElementById("f-unit").value=item.unit;
  document.getElementById("f-cat").value=item.category;
  document.getElementById("f-price").value=item.price||"";
  document.getElementById("f-note").value=item.note||"";
  updatePhotoUI(); openModal();
}
function clearForm(){
  ["f-barcode","f-name","f-qty","f-price","f-note"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("f-unit").value="pcs";
  document.getElementById("f-cat").value="Other";
  updatePhotoUI();
}
function stepQty(d){
  const el=document.getElementById("f-qty");
  el.value = Math.max(0, (Number(el.value)||0) + d);
}
function updatePhotoUI(){
  const preview=document.getElementById("photo-preview"), placeholder=document.getElementById("photo-placeholder"), btn=document.getElementById("btn-remove-photo");
  if(currentPhoto){ preview.src=currentPhoto; preview.style.display="block"; placeholder.style.display="none"; btn.style.display="inline-block"; }
  else { preview.style.display="none"; placeholder.style.display="block"; btn.style.display="none"; }
}
function handlePhoto(e){
  const file=e.target.files[0]; if(!file)return;
  currentPhotoFile=file;
  const reader=new FileReader();
  reader.onload=ev=>{ currentPhoto=ev.target.result; updatePhotoUI(); };
  reader.readAsDataURL(file); e.target.value="";
}
function removePhoto(){ currentPhoto=null; currentPhotoFile=null; updatePhotoUI(); }
function openModal(){ document.getElementById("modal-overlay").classList.add("open"); document.body.style.overflow="hidden"; }
function closeModal(){ document.getElementById("modal-overlay").classList.remove("open"); document.body.style.overflow=""; }
function overlayClick(e){ if(e.target===document.getElementById("modal-overlay")) closeModal(); }

async function handleSubmit(){
  const name=document.getElementById("f-name").value.trim();
  const qty=document.getElementById("f-qty").value;
  if(!name) return showToast("Please enter a product name","error");
  if(qty===""||isNaN(qty)||Number(qty)<0) return showToast("Please enter a valid quantity","error");

  let photoUrl = currentPhoto;
  if(CLOUD && currentPhotoFile){
    try{ showToast("Uploading photo…","info"); photoUrl = await uploadPhoto(currentPhotoFile); }
    catch(err){ console.error(err); showToast("Photo upload failed — saved without photo","error"); photoUrl = (editId && currentPhoto && !currentPhoto.startsWith("data:")) ? currentPhoto : null; }
  }

  const data={
    name, qty:Number(qty),
    unit:document.getElementById("f-unit").value,
    category:document.getElementById("f-cat").value,
    price:Number(document.getElementById("f-price").value)||0,
    barcode:document.getElementById("f-barcode").value.trim(),
    note:document.getElementById("f-note").value.trim(),
    photo:photoUrl
  };

  let target;
  if(editId){
    items = items.map(it=> it.id===editId ? {...it, ...data, updated_by:myName} : it);
    target = items.find(it=>it.id===editId);
    showToast("Product updated");
  } else {
    target = {id:uid(), ...data, updated_by:myName, date:todayStr()};
    items.unshift(target);
    showToast("Product added");
  }
  currentPhotoFile=null;
  closeModal(); render();
  await persistUpsert(target);
}

// ---------- Confirm delete ----------
function confirmDelete(id){
  pendingDeleteId=id;
  document.getElementById("confirm-overlay").classList.add("open");
  document.getElementById("btn-confirm-del").onclick=async ()=>{
    const removeId = pendingDeleteId;
    items=items.filter(i=>i.id!==removeId);
    closeConfirm(); render(); showToast("Deleted","error");
    await persistDelete(removeId);
  };
}
function closeConfirm(){ document.getElementById("confirm-overlay").classList.remove("open"); }

// ---------- Export ----------
function dateStamp(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function downloadBlob(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function exportCSV(){
  if(!items.length) return showToast("No products to export","error");
  const headers=["Name","Quantity","Unit","Category","Unit Price","Total Value","Barcode","Counted By","Date","Notes"];
  const esc2=c=>`"${String(c==null?"":c).replace(/"/g,'""')}"`;
  const rows=items.map(i=>[i.name,i.qty,i.unit,i.category,i.price,(i.qty*i.price).toFixed(2),i.barcode,i.updated_by,i.date,i.note].map(esc2).join(","));
  const csv=[headers.map(esc2).join(","),...rows].join("\r\n");
  downloadBlob(new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"}), `stock-count-${dateStamp()}.csv`);
  showToast("CSV downloaded","success");
}
function exportPDF(){
  if(!items.length) return showToast("No products to export","error");
  const totalItems=items.length, totalQty=items.reduce((s,i)=>s+i.qty,0), totalVal=items.reduce((s,i)=>s+i.qty*i.price,0);
  const counters=[...new Set(items.map(i=>i.updated_by).filter(Boolean))].join(", ")||"—";
  const rows=items.map((i,n)=>`<tr>
      <td>${n+1}</td>
      <td>${esc(i.name)}${i.note?`<div class="n">${esc(i.note)}</div>`:""}</td>
      <td class="r"><b>${i.qty}</b> ${esc(i.unit)}</td>
      <td>${esc(i.category)}</td>
      <td class="r">${i.price?("$"+Number(i.price).toFixed(2)):"—"}</td>
      <td class="r">${i.price?("$"+(i.qty*i.price).toFixed(2)):"—"}</td>
      <td>${esc(i.barcode||"")}</td>
      <td>${esc(i.updated_by||"")}</td>
    </tr>`).join("");
  const doc=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Stock Count Report</title>
    <style>
      *{box-sizing:border-box} body{font-family:'Segoe UI',Arial,sans-serif;color:#1a1a1a;padding:28px;}
      h1{margin:0 0 2px;font-size:22px} .sub{color:#666;font-size:13px;margin-bottom:18px}
      .cards{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
      .c{border:1px solid #ddd;border-radius:10px;padding:12px 16px;min-width:130px}
      .c .v{font-size:20px;font-weight:800} .c .l{font-size:11px;color:#777;text-transform:uppercase;letter-spacing:.5px}
      table{width:100%;border-collapse:collapse;font-size:12px}
      th{background:#f3f4f6;text-align:left;padding:8px;border-bottom:2px solid #ddd;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:#555}
      td{padding:8px;border-bottom:1px solid #eee;vertical-align:top}
      td.r{text-align:right;white-space:nowrap} .n{color:#888;font-size:11px;font-style:italic}
      tfoot td{font-weight:800;border-top:2px solid #ccc;background:#fafafa}
      @media print{body{padding:0}.noprint{display:none}}
      .btn{background:#f5c542;border:none;border-radius:8px;padding:10px 20px;font-weight:700;cursor:pointer;font-size:14px;margin-bottom:18px}
    </style></head><body>
    <button class="btn noprint" onclick="window.print()">🖨️ Print / Save as PDF</button>
    <h1>Stock Count Report</h1>
    <div class="sub">Generated ${new Date().toLocaleString()} · Counted by: ${esc(counters)}</div>
    <div class="cards">
      <div class="c"><div class="v">${totalItems}</div><div class="l">Product Types</div></div>
      <div class="c"><div class="v">${totalQty}</div><div class="l">Total Units</div></div>
      <div class="c"><div class="v">$${totalVal.toFixed(2)}</div><div class="l">Inventory Value</div></div>
    </div>
    <table>
      <thead><tr><th>#</th><th>Product</th><th class="r">Qty</th><th>Category</th><th class="r">Unit Price</th><th class="r">Value</th><th>Barcode</th><th>By</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td></td><td>TOTAL</td><td class="r">${totalQty}</td><td></td><td></td><td class="r">$${totalVal.toFixed(2)}</td><td></td><td></td></tr></tfoot>
    </table>
    <script>window.onload=function(){setTimeout(function(){window.print();},350);}<\/script>
    </body></html>`;
  const w=window.open("","_blank");
  if(!w) return showToast("Allow pop-ups to generate the PDF","error");
  w.document.open(); w.document.write(doc); w.document.close();
}

// ---------- Scanner ----------
function openScanner(){ scannerFromModal=false; startScanner(); }
function openScannerFromModal(){ scannerFromModal=true; closeModal(); startScanner(); }

async function startScanner(){
  document.getElementById("scanner").style.display="flex";
  const supported="BarcodeDetector" in window;
  if(!supported){
    document.getElementById("scanner-body").innerHTML=`
      <div class="unsupported-box">
        <div style="font-size:48px">⚠️</div>
        <div style="font-size:16px;font-weight:600">Scanning not supported</div>
        <div style="font-size:13px;color:#9ca3af;line-height:1.6">Please use Chrome 88+ or Edge 88+, or enter the barcode manually.</div>
        <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px">
          <div style="font-size:13px;color:#9ca3af;text-align:center">Enter barcode manually</div>
          <input id="manual-bc" placeholder="Enter barcode…" style="background:#1a1d27;border:1px solid #2a2d40;border-radius:10px;padding:11px 14px;color:#f3f4f6;font-size:15px;outline:none;width:100%">
          <button onclick="manualScan()" style="background:#f5c542;color:#0f1117;border:none;border-radius:10px;padding:12px 0;font-size:15px;font-weight:700;cursor:pointer">Confirm</button>
        </div>
      </div>`;
    return;
  }
  try {
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}});
    scannerStream=stream;
    const video=document.getElementById("scanner-video");
    video.srcObject=stream; await video.play();
    const detector=new window.BarcodeDetector({formats:["qr_code","ean_13","ean_8","code_128","code_39","upc_a","upc_e","itf","codabar","data_matrix","aztec","pdf417"]});
    const tick=async()=>{
      if(!scannerStream) return;
      if(video.readyState>=2){
        try{
          const barcodes=await detector.detect(video);
          if(barcodes.length>0){ handleScanResult(barcodes[0].rawValue); return; }
        }catch(_){}
      }
      scannerRaf=requestAnimationFrame(tick);
    };
    scannerRaf=requestAnimationFrame(tick);
  } catch(e) {
    document.getElementById("scanner-body").innerHTML=`
      <div class="unsupported-box">
        <div style="font-size:48px">📷</div>
        <div style="font-size:14px;color:#f87171">Camera access denied: ${esc(e.message)}</div>
        <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px">
          <input id="manual-bc" placeholder="Enter barcode…" style="background:#1a1d27;border:1px solid #2a2d40;border-radius:10px;padding:11px 14px;color:#f3f4f6;font-size:15px;outline:none;width:100%">
          <button onclick="manualScan()" style="background:#f5c542;color:#0f1117;border:none;border-radius:10px;padding:12px 0;font-size:15px;font-weight:700;cursor:pointer">Confirm</button>
        </div>
      </div>`;
  }
}

function manualScan(){
  const val=document.getElementById("manual-bc")?.value.trim();
  if(val) handleScanResult(val);
}

function handleScanResult(code){
  closeScanner();
  const existing=items.find(it=>it.barcode===code);
  if(existing){
    editId=existing.id; currentPhoto=existing.photo||null; currentPhotoFile=null;
    document.getElementById("modal-title").textContent="Edit Product";
    document.getElementById("btn-submit").textContent="Save Changes";
    document.getElementById("f-barcode").value=existing.barcode||"";
    document.getElementById("f-name").value=existing.name;
    document.getElementById("f-qty").value=existing.qty+1;
    document.getElementById("f-unit").value=existing.unit;
    document.getElementById("f-cat").value=existing.category;
    document.getElementById("f-price").value=existing.price||"";
    document.getElementById("f-note").value=existing.note||"";
    updatePhotoUI(); openModal();
    showToast(`Found: ${existing.name} — qty +1`,"info");
  } else {
    editId=null; currentPhoto=null; currentPhotoFile=null;
    document.getElementById("modal-title").textContent="Add Product";
    document.getElementById("btn-submit").textContent="Add Product";
    clearForm();
    document.getElementById("f-barcode").value=code;
    document.getElementById("f-qty").value="1";
    updatePhotoUI(); openModal();
    showToast("Barcode scanned — fill in product details","info");
  }
}

function closeScanner(){
  if(scannerRaf) cancelAnimationFrame(scannerRaf); scannerRaf=null;
  if(scannerStream){ scannerStream.getTracks().forEach(t=>t.stop()); scannerStream=null; }
  document.getElementById("scanner").style.display="none";
}

// ---------- Init ----------
async function init(){
  document.getElementById("whoami").textContent = myName || "set name";
  await loadItems();
  render();
  renderPresence();
  subscribeRealtime();
  if(!myName){ document.getElementById("name-overlay").classList.add("open"); }
  else { setupPresence(); }
  flushQueue();
}
init();
</script>
</body>
</html>
